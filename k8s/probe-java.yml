apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-java
  namespace: distro-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: probe-java
  template:
    metadata:
      labels:
        app: probe-java
    spec:
      containers:
        - name: probe-java
          image: distro-probe-java:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: distro-config
          env:
            - name: PROBE_ID
              value: "java-probe-us-east"
            - name: REGION
              value: "us-east-1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
