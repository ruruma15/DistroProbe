apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-go
  namespace: distro-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: probe-go
  template:
    metadata:
      labels:
        app: probe-go
    spec:
      containers:
        - name: probe-go
          image: distro-probe-go:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: distro-config
          env:
            - name: PROBE_ID
              value: "go-probe-us-west"
            - name: REGION
              value: "us-west-1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
