apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: distro-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      containers:
        - name: collector
          image: distro-collector:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8000
              name: metrics
          envFrom:
            - configMapRef:
                name: distro-config
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: PROMETHEUS_PORT
              value: "8000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: collector-service
  namespace: distro-probe
spec:
  selector:
    app: collector
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 8000
      targetPort: 8000
  type: LoadBalancer
