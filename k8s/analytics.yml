apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: distro-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: distro-analytics:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
              name: metrics
          envFrom:
            - configMapRef:
                name: distro-config
          env:
            - name: PROMETHEUS_PORT
              value: "8001"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
